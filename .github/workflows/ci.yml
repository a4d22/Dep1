name: CI

on:
  push:
    branches:
      - main
  
  pull_request:
    branches:
      - main


jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r serving/requirements.txt
          pip install pytest httpx
        
      # - name: Run Tests
      #   run: |
      #     pytest -v
      
      - name: Build Docker Image
        run: |
          docker build -t income-api:${{ github.sha }} .
      
      - name: Tag Docker Image
        run: |
          docker tag income-api:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/{{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
      
      - name: Push Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
