name: CI

on:
  push:
    branches:
      - main
  
  pull_request:
    branches:
      - main


jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r serving/requirements.txt
          pip install pytest httpx
        
      - name: Run Tests
        run: |
          pytest -v
      
      - name: Build Docker Image
        run: |
          docker build -t income-api:${{ github.sha }} .
      
      - name: Verify Image Exists
        run: |
          docker images
